trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  azureSubscription: 'FLX'
  acrLoginServer: 'flxstoreacr.azurecr.io'
  acrName: 'flxstoreacr'
  imageRepository: 'azure-image-uploader'
  containerAppName: 'flxstore'
  resourceGroup: 'FLX-TEST'
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: 'Build and Push'
  jobs:
  - job: Build
    displayName: 'Build Docker Image'
    steps:
    - task: Docker@2
      displayName: 'Build and Push to ACR'
      inputs:
        command: buildAndPush
        containerRegistry: 'flx-acr' #dockerregistrySA
        repository: '$(imageRepository)'
        dockerfile: '**/Dockerfile'
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: 'Deploy to Container App'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Deploy
    displayName: 'Update Container App'
    steps:

    # ✅ NEW: Grant Container App permission to pull from ACR
    - task: AzureCLI@2
      displayName: 'Link ACR to Container App (Managed Identity)'
      inputs:
        azureSubscription: '$(azureSubscription)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          # Enable system-assigned managed identity on the Container App
          az containerapp identity assign \
            --name $(containerAppName) \
            --resource-group $(resourceGroup) \
            --system-assigned

          # Get the principal ID of the managed identity
          PRINCIPAL_ID=$(az containerapp show \
            --name $(containerAppName) \
            --resource-group $(resourceGroup) \
            --query identity.principalId -o tsv)

          # Get the ACR resource ID
          ACR_ID=$(az acr show \
            --name $(acrName) \
            --query id -o tsv)

          # Grant AcrPull role to the managed identity
          az role assignment create \
            --assignee $PRINCIPAL_ID \
            --role AcrPull \
            --scope $ACR_ID

          # Link ACR to the Container App using managed identity
          az containerapp registry set \
            --name $(containerAppName) \
            --resource-group $(resourceGroup) \
            --server $(acrLoginServer) \
            --identity system

    - task: AzureContainerApps@1
      displayName: 'Deploy to Container App'
      inputs:
        azureSubscription: '$(azureSubscription)'
        containerAppName: '$(containerAppName)'
        resourceGroup: '$(resourceGroup)'
        imageToDeploy: '$(acrLoginServer)/$(imageRepository):$(tag)'
        environmentVariables: |
          KEY_VAULT_URL=https://flxlock.vault.azure.net/
          STORAGE_ACCOUNT_NAME=flxcontainer
          CONTAINER_NAME=images
          NODE_ENV=production
          PORT=80
